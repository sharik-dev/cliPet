<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>cliPet — Moderation</title>
  <style>
    :root {
      --bg:#0d0f12; --panel:#15181d; --border:#262b32; --text:#e7e9ec;
      --dim:#8a929c; --accent:#ce2828; --accent2:#4aa3a3;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:ui-monospace,"SF Mono",Menlo,monospace; padding:24px; line-height:1.5; }
    .wrap { max-width:1100px; margin:0 auto; }
    header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:12px; }
    h1 { font-size:20px; letter-spacing:2px; }
    .tabs { display:flex; gap:6px; }
    .tabs button { background:var(--panel); border:1px solid var(--border); color:var(--dim); font:inherit; font-size:12px; padding:6px 14px; border-radius:6px; cursor:pointer; }
    .tabs button.on { color:var(--accent2); border-color:var(--accent2); }
    .meta { font-size:12px; color:var(--dim); margin-bottom:14px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:14px; }
    .card.flagged { border-color:var(--accent); }
    .pv { width:100%; height:120px; display:flex; align-items:center; justify-content:center; background:#0a0c0f; border-radius:6px; margin-bottom:10px; image-rendering:pixelated; }
    .pv canvas { image-rendering:pixelated; }
    .nm { font-size:14px; font-weight:600; }
    .au { font-size:11px; color:var(--dim); margin-bottom:8px; }
    .stat { font-size:11px; color:var(--dim); display:flex; gap:12px; margin-bottom:10px; }
    .stat .rep { color:var(--accent); }
    .btn { width:100%; background:var(--panel); border:1px solid var(--border); color:var(--text); font:inherit; font-size:12px; padding:7px; border-radius:6px; cursor:pointer; }
    .btn.danger { border-color:var(--accent); color:var(--accent); }
    .btn.ok { border-color:var(--accent2); color:var(--accent2); }
    .empty { color:var(--dim); font-size:13px; padding:30px 0; }
    .reports { display:flex; flex-direction:column; gap:8px; }
    .report { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:10px 14px; font-size:12px; }
    .report .pn { color:var(--accent2); }
    .report .rs { color:var(--text); }
    .report .dt { color:var(--dim); font-size:11px; }
    .lang { display:flex; gap:6px; }
    .lang button { background:var(--panel); border:1px solid var(--border); color:var(--dim); font:inherit; font-size:12px; padding:4px 10px; border-radius:4px; cursor:pointer; }
    .lang button.on { color:var(--accent2); border-color:var(--accent2); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>🐾 <span data-i18n="title">cliPet Moderation</span></h1>
      <div class="lang">
        <button data-lang="en" class="on">EN</button>
        <button data-lang="fr">FR</button>
      </div>
    </header>
    <div class="tabs">
      <button data-tab="live" class="on" data-i18n="tabLive">Live</button>
      <button data-tab="removed" data-i18n="tabRemoved">Removed</button>
      <button data-tab="reports" data-i18n="tabReports">Reports</button>
    </div>
    <p class="meta" id="meta"></p>
    <div id="content"></div>
  </div>

  <script>
    const I18N = {
      en: { title:"cliPet Moderation", tabLive:"Live", tabRemoved:"Removed", tabReports:"Reports",
            remove:"Remove", restore:"Restore", downloads:"downloads", reports:"reports",
            empty:"Nothing here.", loaded:"%n pet(s)", loadedR:"%n report(s)" },
      fr: { title:"Modération cliPet", tabLive:"En ligne", tabRemoved:"Retirés", tabReports:"Signalements",
            remove:"Retirer", restore:"Republier", downloads:"téléch.", reports:"signal.",
            empty:"Rien ici.", loaded:"%n pet(s)", loadedR:"%n signalement(s)" },
    };
    let lang = localStorage.getItem("clipet.mod.lang") || (navigator.language.startsWith("fr") ? "fr" : "en");
    let tab = "live";
    const T = k => I18N[lang][k];

    // Couleurs par défaut des chars de base (miroir de l'app) pour le rendu preview.
    const BASE = { g:"#969BA1", w:"#F5F5F5", d:"#3C4045", o:"#141414", p:"#CE2828",
                   X:"#1b1d21", h:"#2a2d31", r:"#b07a3a" };

    function colorFor(ch, palette) {
      if (ch === "." || ch === " ") return null;
      const cc = (palette && palette.customColors) || {};
      return cc[ch] || BASE[ch] || "#888";
    }

    function renderPreview(el, preview) {
      const frame = (preview && preview.frame) || [];
      const palette = (preview && preview.palette) || {};
      const h = frame.length, w = frame.reduce((m,r)=>Math.max(m,r.length),0);
      if (!h || !w) return;
      const cv = document.createElement("canvas");
      cv.width = w; cv.height = h;
      const scale = Math.min(110/h, 200/w, 6);
      cv.style.width = (w*scale)+"px"; cv.style.height = (h*scale)+"px";
      const ctx = cv.getContext("2d");
      for (let y=0;y<h;y++) for (let x=0;x<frame[y].length;x++) {
        const c = colorFor(frame[y][x], palette);
        if (c) { ctx.fillStyle = c; ctx.fillRect(x,y,1,1); }
      }
      el.appendChild(cv);
    }

    async function api(path, opts) {
      const r = await fetch(path, opts);
      if (r.status === 401) { location.href = "/dashboard/"; throw new Error("auth"); }
      return r.json();
    }

    function petCard(p) {
      const card = document.createElement("div");
      card.className = "card" + (p.reports > 0 ? " flagged" : "");
      const pv = document.createElement("div"); pv.className = "pv";
      renderPreview(pv, p.preview);
      card.appendChild(pv);
      const isRemoved = p.status === "removed";
      const action = isRemoved
        ? `<button class="btn ok" data-act="restore" data-id="${p.id}">${T("restore")}</button>`
        : `<button class="btn danger" data-act="remove" data-id="${p.id}">${T("remove")}</button>`;
      const info = document.createElement("div");
      info.innerHTML =
        `<div class="nm">${esc(p.name)}</div>` +
        `<div class="au">@${esc(p.author)}</div>` +
        `<div class="stat"><span>${p.downloads} ${T("downloads")}</span>` +
        (p.reports>0?`<span class="rep">${p.reports} ${T("reports")}</span>`:``) + `</div>` +
        action;
      card.appendChild(info);
      return card;
    }

    function esc(s){ return String(s).replace(/[<>&"]/g, c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c])); }

    async function load() {
      const content = document.getElementById("content");
      const meta = document.getElementById("meta");
      content.innerHTML = "";
      if (tab === "reports") {
        const reports = await api("/api/admin/reports");
        meta.textContent = T("loadedR").replace("%n", reports.length);
        if (!reports.length) { content.innerHTML = `<p class="empty">${T("empty")}</p>`; return; }
        const box = document.createElement("div"); box.className = "reports";
        reports.forEach(r => {
          const d = document.createElement("div"); d.className = "report";
          d.innerHTML = `<span class="pn">${esc(r.pet_name||r.pet_id)}</span> — ` +
            `<span class="rs">${esc(r.reason||"—")}</span> ` +
            `<span class="dt">${new Date(r.created_at).toLocaleString()}</span>`;
          box.appendChild(d);
        });
        content.appendChild(box);
        return;
      }
      const pets = await api("/api/admin/pets?status=" + tab);
      meta.textContent = T("loaded").replace("%n", pets.length);
      if (!pets.length) { content.innerHTML = `<p class="empty">${T("empty")}</p>`; return; }
      const grid = document.createElement("div"); grid.className = "grid";
      pets.forEach(p => grid.appendChild(petCard(p)));
      content.appendChild(grid);
    }

    document.addEventListener("click", async (e) => {
      const b = e.target.closest("button[data-act]");
      if (!b) return;
      b.disabled = true;
      await api(`/api/admin/pets/${b.dataset.id}/${b.dataset.act}`, { method:"POST" });
      load();
    });
    document.querySelectorAll(".tabs button").forEach(b =>
      b.addEventListener("click", () => {
        tab = b.dataset.tab;
        document.querySelectorAll(".tabs button").forEach(x=>x.classList.toggle("on",x===b));
        load();
      }));
    function applyLang(l){
      lang=l; localStorage.setItem("clipet.mod.lang",l);
      document.documentElement.lang=l;
      document.querySelectorAll("[data-i18n]").forEach(el=>{ const k=el.getAttribute("data-i18n"); if(I18N[l][k]) el.textContent=I18N[l][k]; });
      document.querySelectorAll(".tabs button").forEach(b=>{ const k=b.dataset.tab==="live"?"tabLive":b.dataset.tab==="removed"?"tabRemoved":"tabReports"; b.textContent=I18N[l][k]; });
      document.querySelectorAll(".lang button").forEach(b=>b.classList.toggle("on",b.dataset.lang===l));
      load();
    }
    document.querySelectorAll(".lang button").forEach(b=>b.addEventListener("click",()=>applyLang(b.dataset.lang)));
    applyLang(lang);
  </script>
</body>
</html>
